name: Publish to GitHub Packages

on:
  release:
    types: [published]

jobs:
  github-publish:
    name: Upload release to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish distribution 📦 to GitHub Packages
        run: |
          twine upload dist/* \
            --repository-url https://python.pkg.github.com/ssi-dk/uqcme \
            --username __token__ \
            --password ${{ secrets.GITHUB_TOKEN }}
        env:
          TWINE_NON_INTERACTIVE: true
