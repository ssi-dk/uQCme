name: Publish Python Artifacts to GitHub

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  github-artifacts:
    name: Build and publish PyPI-compatible artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: |
          twine check dist/*

      - name: Upload to GitHub Release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" dist/* --clobber

      - name: Summary
        run: |
          echo "Built PyPI-compatible files:" >> "$GITHUB_STEP_SUMMARY"
          ls -1 dist/* >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "Uploaded to release tag: ${{ github.event.release.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Manual run: build/validation only (no release upload)." >> "$GITHUB_STEP_SUMMARY"
          fi
