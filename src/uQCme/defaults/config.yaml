title: "uQCme - Microbial QC Reporter"
version: "0.8.3"

qc:
  input:
    data:
      file: ""
      api_call: ""
      api_bearer_token: ""
      api_bearer_token_env: ""
      api_headers: {}
    mapping: "mapping.yaml"
    qc_rules: "QC_rules.tsv"
    qc_tests: "QC_tests.tsv"
  output:
    results: "qc_results.tsv"
    warnings: "qc_warnings.tsv"

app:
  server:
    host: "127.0.0.1"
    port: 8501
  input:
    data:
      file: "qc_results.tsv"
      api_call: ""
      api_bearer_token: ""
      api_bearer_token_env: ""
      api_headers: {}
    mapping: "mapping.yaml"
    qc_rules: "QC_rules.tsv"
    qc_tests: "QC_tests.tsv"
    warnings: "qc_warnings.tsv"
  dashboard:
    categorical_filter_threshold: 20
    section_toggle_columns: 3
    max_displayed_rules: 10
    report_mode:
      enabled: false
      default_visible_sections: {}
      default_filters: {}
    sample_api_actions: []
    # Example:
    # sample_api_actions:
    #   - label: "Send Selected Samples"
    #     api_call: "https://example.org/api/samples"
    #     value_field: "sample_name"
    #     method: "POST"
    #     api_bearer_token_env: "UQCME_ACTION_TOKEN"
    #     payload_field: "samples"
    #     send_as_list: true
    #     include_sample_ids: false
  ui_styling:
  priority_colors:
    1: "#90EE90"
    2: "#FFFFE0"
    3: "#F08080"
    4: "#FFB6C1"
log:
  file: "uqcme.log"
